name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ---------- Lint & type-check ----------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: MyPy type check
        run: uv run mypy src/

      - name: Bandit security scan
        run: uv run bandit -r src/ -l

  # ---------- Tests ----------
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest --cov=src --cov-report=xml --cov-report=term-missing

      - name: Enforce coverage threshold
        if: matrix.os == 'ubuntu-latest'
        run: uv run coverage report

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        if: matrix.os == 'ubuntu-latest'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ---------- Frontend ----------
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # frontend/tsconfig.json is a solution-style config with an empty
      # `files` array and only project references — `tsc --noEmit` against
      # it type-checks nothing and always exits 0, silently passing real
      # type errors in src/. `tsc -b` (matching the repo's own `build`
      # script) follows the references and actually checks tsconfig.app.json
      # and tsconfig.node.json.
      - name: TypeScript type check
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

  # ---------- Integration smoke test ----------
  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Prepare CI environment
        run: cp .env.ci .env

      - name: Start API and dependencies
        run: docker compose up -d --build postgres redis jidou-api

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8192/api/admin/health && break
            echo "Attempt $i: API not ready, retrying in 3s..."
            sleep 3
          done
          curl -sf http://localhost:8192/api/admin/health

      - name: Verify key endpoints respond
        run: |
          curl -sf http://localhost:8192/api/shows
          curl -sf http://localhost:8192/api/files

      - name: Check migration state
        run: docker compose exec -T jidou-api alembic current

      - name: Print API logs on failure
        if: failure()
        run: docker compose logs jidou-api

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ---------- Build wheel ----------
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build wheel and sdist
        run: uv build

      - name: Check distribution with twine
        run: uv run twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
