# Alembic configuration file.

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for generating version timestamps.
timezone = UTC

# SQL log level.
sql_echo = false

# SQLAlchemy URL for database connection.
# Override via DATABASE_URL environment variable.
sqlalchemy.url = postgresql+asyncpg://jidou:jidou_dev_password@localhost:5432/jidou

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
