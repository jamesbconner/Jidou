# Jidou - Docker Compose Configuration
#
# Services:
#   jidou-api       - FastAPI + Uvicorn (port 8192)
#   jidou-frontend  - React SPA via Nginx (port 3100)
#   jidou-worker    - Celery worker for background tasks
#   postgres        - PostgreSQL 16
#   redis           - Redis 7 (broker + cache + rate limiter)

# ============================================================
# Development Profile (default)
# ============================================================

services:
  # ----------------------------------------------------------
  # Database
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: jidou-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jidou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jidou_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-jidou}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jidou}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis (broker + cache + rate limiter)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jidou-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # FastAPI API Server
  # ----------------------------------------------------------
  jidou-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: jidou-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8192}:8192"
    environment:
      # Database — dynamic from env vars (falls back to .env.example defaults)
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-jidou}:${POSTGRES_PASSWORD:-jidou_dev_password}@postgres:5432/${POSTGRES_DB:-jidou}}
      # Redis
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # TMDB API
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_BASE_URL=${TMDB_BASE_URL:-https://api.themoviedb.org/3}
      - TMDB_RATE_LIMIT_PER_SECOND=${TMDB_RATE_LIMIT_PER_SECOND:-0.5}
      - TMDB_CACHE_TTL=${TMDB_CACHE_TTL:-604800}
      - TMDB_CACHE_MAXSIZE=${TMDB_CACHE_MAXSIZE:-25000}
      # LLM (optional)
      - LLM_PROVIDER=${LLM_PROVIDER:-none}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_CACHE_TTL=${LLM_CACHE_TTL:-3600}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-30}
      - LLM_NO_THINK=${LLM_NO_THINK:-true}
      # SFTP
      - SFTP_HOST=${SFTP_HOST:-}
      - SFTP_PORT=${SFTP_PORT:-22}
      - SFTP_USERNAME=${SFTP_USERNAME:-}
      - SFTP_PASSWORD=${SFTP_PASSWORD:-}
      - SFTP_KEY_PATH=${SFTP_KEY_PATH:-}
      - SFTP_REMOTE_PATHS=${SFTP_REMOTE_PATHS:-/}
      - SFTP_MAX_WORKERS=${SFTP_MAX_WORKERS:-8}
      - SFTP_MAX_RETRIES=${SFTP_MAX_RETRIES:-3}
      - SFTP_RETRY_DELAY=${SFTP_RETRY_DELAY:-1.0}
      - LOCAL_STAGING_PATH=${LOCAL_STAGING_PATH:-/data/staging}
      # Media base paths (container-side — used for file I/O)
      - LOCAL_TV_PATH=${LOCAL_TV_PATH:-/data/media/tv}
      - LOCAL_ANIME_PATH=${LOCAL_ANIME_PATH:-/data/media/anime}
      - LOCAL_MOVIE_PATH=${LOCAL_MOVIE_PATH:-/data/media/movies}
      # Media host paths — passed into the container so /api/config can expose
      # the path the user recognises (e.g. D:\shows\tv) instead of the
      # container-internal path.  Defaults to container path (Linux/macOS no-op).
      - LOCAL_TV_HOST_PATH=${LOCAL_TV_HOST_PATH:-${LOCAL_TV_PATH:-/data/media/tv}}
      - LOCAL_ANIME_HOST_PATH=${LOCAL_ANIME_HOST_PATH:-${LOCAL_ANIME_PATH:-/data/media/anime}}
      - LOCAL_MOVIE_HOST_PATH=${LOCAL_MOVIE_HOST_PATH:-${LOCAL_MOVIE_PATH:-/data/media/movies}}
      # RSS
      - RSS_CONFIG_REMOTE_PATH=${RSS_CONFIG_REMOTE_PATH:-}
      # Schedules — mirrored here so /api/config reports correct enabled status
      - SYNC_SCHEDULE_ENABLED=${SYNC_SCHEDULE_ENABLED:-false}
      - SYNC_SCHEDULE_HOURS=${SYNC_SCHEDULE_HOURS:-2}
      - RSS_IMPORT_SCHEDULE_ENABLED=${RSS_IMPORT_SCHEDULE_ENABLED:-false}
      - RSS_IMPORT_SCHEDULE_HOURS=${RSS_IMPORT_SCHEDULE_HOURS:-2}
      # Application
      - DEBUG=${DEBUG:-true}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3100}
      - JIDOU_API_KEY=${JIDOU_API_KEY:-}
      # Server
      - HOST=0.0.0.0
      - PORT=8192
    volumes:
      # Mount source code for hot reload in development
      - ./src:/app/src
      # Mount SSH private key for SFTP key-based auth (optional).
      # Set SFTP_KEY_FILE in .env to the host path of your private key.
      # The container path /run/secrets/sftp_key matches SFTP_KEY_PATH default.
      - ${SFTP_KEY_FILE:-/dev/null}:/run/secrets/sftp_key:ro
      # Staging: plain bind mount. HOST_PATH is the source on the Docker host
      # (supports Windows paths like D:\media\staging); LOCAL_*_PATH is the
      # container-internal target. HOST_PATH falls back to LOCAL_*_PATH so
      # existing .env files keep working.
      - ${LOCAL_STAGING_HOST_PATH:-${LOCAL_STAGING_PATH:-/data/staging}}:${LOCAL_STAGING_PATH:-/data/staging}
      # Routed media (TV/anime/movies): NAS-backed named volumes (see the
      # `volumes:` section at the bottom of this file) — NOT a bind mount.
      # A Windows mapped-drive/UNC bind mount does not reliably support write
      # access for new files/directories on a network share (reads work, but
      # creating a new show directory can silently fail with a permission
      # error); Docker's own CIFS volume driver avoids this by mounting the
      # share directly from Docker's Linux VM. LOCAL_*_HOST_PATH is still used
      # elsewhere (display in /api/config, manual import path parsing) but no
      # longer determines where these three are actually mounted from.
      - nas_tv:${LOCAL_TV_PATH:-/data/media/tv}
      - nas_anime:${LOCAL_ANIME_PATH:-/data/media/anime}
      - nas_movies:${LOCAL_MOVIE_PATH:-/data/media/movies}
    command: >
      uvicorn jidou.main:app
      --host 0.0.0.0
      --port 8192
      --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8192/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - default
      - backend
      - frontend

  # ----------------------------------------------------------
  # Celery Worker
  # ----------------------------------------------------------
  jidou-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: jidou-worker
    restart: unless-stopped
    environment:
      # Database — dynamic from env vars
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-jidou}:${POSTGRES_PASSWORD:-jidou_dev_password}@postgres:5432/${POSTGRES_DB:-jidou}}
      # Redis
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # TMDB API
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_BASE_URL=${TMDB_BASE_URL:-https://api.themoviedb.org/3}
      - TMDB_RATE_LIMIT_PER_SECOND=${TMDB_RATE_LIMIT_PER_SECOND:-0.5}
      - TMDB_CACHE_TTL=${TMDB_CACHE_TTL:-604800}
      - TMDB_CACHE_MAXSIZE=${TMDB_CACHE_MAXSIZE:-25000}
      # LLM (optional)
      - LLM_PROVIDER=${LLM_PROVIDER:-none}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_CACHE_TTL=${LLM_CACHE_TTL:-3600}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-30}
      - LLM_NO_THINK=${LLM_NO_THINK:-true}
      # SFTP
      - SFTP_HOST=${SFTP_HOST:-}
      - SFTP_PORT=${SFTP_PORT:-22}
      - SFTP_USERNAME=${SFTP_USERNAME:-}
      - SFTP_PASSWORD=${SFTP_PASSWORD:-}
      - SFTP_KEY_PATH=${SFTP_KEY_PATH:-}
      - SFTP_REMOTE_PATHS=${SFTP_REMOTE_PATHS:-/}
      - SFTP_MAX_WORKERS=${SFTP_MAX_WORKERS:-8}
      - SFTP_MAX_RETRIES=${SFTP_MAX_RETRIES:-3}
      - SFTP_RETRY_DELAY=${SFTP_RETRY_DELAY:-1.0}
      - LOCAL_STAGING_PATH=${LOCAL_STAGING_PATH:-/data/staging}
      # Media base paths
      - LOCAL_TV_PATH=${LOCAL_TV_PATH:-/data/media/tv}
      - LOCAL_ANIME_PATH=${LOCAL_ANIME_PATH:-/data/media/anime}
      - LOCAL_MOVIE_PATH=${LOCAL_MOVIE_PATH:-/data/media/movies}
      # RSS
      - RSS_CONFIG_REMOTE_PATH=${RSS_CONFIG_REMOTE_PATH:-}
      - DELUGE_STOP_COMMAND=${DELUGE_STOP_COMMAND:-}
      - DELUGE_RESTART_COMMAND=${DELUGE_RESTART_COMMAND:-}
      - DELUGE_STOP_DELAY_SECONDS=${DELUGE_STOP_DELAY_SECONDS:-10}
      - DELUGE_RESTART_DELAY_SECONDS=${DELUGE_RESTART_DELAY_SECONDS:-2}
      # Application
      - DEBUG=${DEBUG:-true}
      - JIDOU_API_KEY=${JIDOU_API_KEY:-}
      # Celery
      - CELERY_CONCURRENCY=${CELERY_CONCURRENCY:-4}
      - CELERY_PREFETCH_MULTIPLIER=${CELERY_PREFETCH_MULTIPLIER:-1}
    volumes:
      # Mount source code for hot reload in development
      - ./src:/app/src
      # Mount SSH private key for SFTP key-based auth (optional).
      - ${SFTP_KEY_FILE:-/dev/null}:/run/secrets/sftp_key:ro
      # Staging: plain bind mount — see jidou-api volumes comment above.
      - ${LOCAL_STAGING_HOST_PATH:-${LOCAL_STAGING_PATH:-/data/staging}}:${LOCAL_STAGING_PATH:-/data/staging}
      # Routed media: NAS-backed named volumes — see jidou-api volumes comment above.
      - nas_tv:${LOCAL_TV_PATH:-/data/media/tv}
      - nas_anime:${LOCAL_ANIME_PATH:-/data/media/anime}
      - nas_movies:${LOCAL_MOVIE_PATH:-/data/media/movies}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - default
      - backend
      - frontend

  # ----------------------------------------------------------
  # Celery Beat Scheduler
  # ----------------------------------------------------------
  jidou-beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: jidou-beat
    restart: unless-stopped
    command: >
      celery -A jidou.workers.celery_app:celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
      --schedule /data/celerybeat/celerybeat-schedule
    environment:
      # Database
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-jidou}:${POSTGRES_PASSWORD:-jidou_dev_password}@postgres:5432/${POSTGRES_DB:-jidou}}
      # Redis
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      # TMDB API
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_RATE_LIMIT_PER_SECOND=${TMDB_RATE_LIMIT_PER_SECOND:-0.5}
      # LLM (optional)
      - LLM_PROVIDER=${LLM_PROVIDER:-none}
      - LLM_MODEL=${LLM_MODEL:-}
      # SFTP
      - SFTP_REMOTE_PATHS=${SFTP_REMOTE_PATHS:-/}
      # RSS
      - RSS_CONFIG_REMOTE_PATH=${RSS_CONFIG_REMOTE_PATH:-}
      # Schedules
      - SYNC_SCHEDULE_ENABLED=${SYNC_SCHEDULE_ENABLED:-false}
      - SYNC_SCHEDULE_HOURS=${SYNC_SCHEDULE_HOURS:-2}
      - RSS_IMPORT_SCHEDULE_ENABLED=${RSS_IMPORT_SCHEDULE_ENABLED:-false}
      - RSS_IMPORT_SCHEDULE_HOURS=${RSS_IMPORT_SCHEDULE_HOURS:-2}
      # Application
      - DEBUG=${DEBUG:-false}
      - JIDOU_API_KEY=${JIDOU_API_KEY:-}
    volumes:
      - ./src:/app/src
      - celerybeat_data:/data/celerybeat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - default
      - backend
      - frontend

  # ----------------------------------------------------------
  # React Frontend (served via Nginx)
  # ----------------------------------------------------------
  jidou-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jidou-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3100}:80"
    environment:
      - JIDOU_API_KEY=${JIDOU_API_KEY:-}
    depends_on:
      jidou-api:
        condition: service_healthy
    profiles:
      - default
      - frontend

# ============================================================
# Volumes
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  celerybeat_data:
    driver: local
  # NAS CIFS-backed routed media storage. See the LOCAL_TV/ANIME/MOVIE_HOST_PATH
  # comment in .env.example for why this replaces a plain Windows bind mount.
  # uid=1000/gid=1000 matches appuser (see Dockerfile.worker/Dockerfile.api) so
  # the container can write directly without a chown step.
  nas_tv:
    driver: local
    driver_opts:
      type: cifs
      device: "${NAS_SHARE_HOST}/tv"
      o: "vers=${NAS_SHARE_VERSION:-3.0},username=${NAS_SHARE_USERNAME},password=${NAS_SHARE_PASSWORD},uid=1000,gid=1000,file_mode=0775,dir_mode=0775"
  nas_anime:
    driver: local
    driver_opts:
      type: cifs
      device: "${NAS_SHARE_HOST}/anime tv"
      o: "vers=${NAS_SHARE_VERSION:-3.0},username=${NAS_SHARE_USERNAME},password=${NAS_SHARE_PASSWORD},uid=1000,gid=1000,file_mode=0775,dir_mode=0775"
  nas_movies:
    driver: local
    driver_opts:
      type: cifs
      device: "${NAS_SHARE_HOST}/movies"
      o: "vers=${NAS_SHARE_VERSION:-3.0},username=${NAS_SHARE_USERNAME},password=${NAS_SHARE_PASSWORD},uid=1000,gid=1000,file_mode=0775,dir_mode=0775"
